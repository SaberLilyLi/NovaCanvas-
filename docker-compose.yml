services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: novacanvas
      POSTGRES_USER: novacanvas
      POSTGRES_PASSWORD: novacanvas
    ports:
      - "5432:5432"
    volumes:
      - novacanvas-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novacanvas"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - novacanvas-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  novacanvas-postgres:
  novacanvas-redis:
